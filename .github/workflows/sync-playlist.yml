name: Sync Playlist Transcripts

on:
  workflow_dispatch:
  schedule:
    # Every 4 hours
    - cron: '0 */4 * * *'

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install deno (required by yt-dlp for YouTube JS extraction)
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Verify deno
        run: |
          which deno
          deno --version

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install yt-dlp

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Set up YouTube cookies
        env:
          YT_COOKIES: ${{ secrets.YT_COOKIES }}
        run: |
          if [ -n "$YT_COOKIES" ]; then
            printf "%s" "$YT_COOKIES" > pipeline/.yt-cookies.txt
            echo "Wrote pipeline/.yt-cookies.txt ($(wc -c < pipeline/.yt-cookies.txt) bytes)"
          else
            echo "::warning::YT_COOKIES secret is not set. yt-dlp may hit bot checks."
            echo "To fix: export YouTube cookies (Netscape format) and set repo secret YT_COOKIES."
          fi

      - name: Run sync
        env:
          PYTHONUNBUFFERED: '1'
          SYNC_GIT_MODE: stage-only
        run: |
          cd pipeline
          ./sync_playlist.sh

      - name: Create or update pull request
        uses: peter-evans/create-pull-request@v8
        with:
          branch: automation/sync-playlist-transcripts
          base: main
          delete-branch: true
          commit-message: Update playlist transcripts
          title: Update playlist transcripts
          body: |
            Automated playlist transcript sync.

            This PR was opened by GitHub Actions because direct pushes to `main` are blocked by repository rules.
